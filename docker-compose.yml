services:
  postgres:
    image: postgres:18-alpine
    container_name: shoppa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shoppa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shoppa}
      POSTGRES_DB: ${POSTGRES_DB:-shoppa}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - shoppa-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-shoppa} -d ${POSTGRES_DB:-shoppa}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: shoppa-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - shoppa-redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  shoppa-postgres-data:
  shoppa-redis-data:
